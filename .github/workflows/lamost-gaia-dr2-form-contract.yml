name: LAMOST Gaia DR2 form contract

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/probe_lamost_gaia_dr2_csv.py"
      - "tests/test_probe_lamost_gaia_dr2_csv.py"
      - ".github/workflows/lamost-gaia-dr2-form-contract.yml"

permissions:
  contents: read

concurrency:
  group: lamost-gaia-dr2-form-contract-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install public pipeline
        run: python -m pip install -e '.[dev]'
      - name: Compile and run candidate-safe tests
        run: |
          python -m py_compile \
            scripts/probe_lamost_gaia_dr2_csv.py \
            tests/test_probe_lamost_gaia_dr2_csv.py
          python -m unittest discover \
            -s tests \
            -p 'test_probe_lamost_gaia_dr2_csv.py' \
            -v
      - name: Probe official-sample Gaia DR2 form contract
        id: probe
        continue-on-error: true
        run: |
          python scripts/probe_lamost_gaia_dr2_csv.py \
            --output lamost_gaia_dr2_form_contract.json \
            > lamost_gaia_dr2_form_probe.log 2>&1
      - name: Upload candidate-safe contract
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lamost-gaia-dr2-form-contract-${{ github.run_id }}
          path: |
            lamost_gaia_dr2_form_contract.json
            lamost_gaia_dr2_form_probe.log
          if-no-files-found: error
          retention-days: 30
      - name: Preserve probe failure after artifact upload
        if: always()
        run: test "${{ steps.probe.outcome }}" = "success"
