name: datalab-overlap-smoke

on:
  pull_request:
    paths:
      - "src/hou_compact/datalab.py"
      - "scripts/probe_datalab_overlap_schema.py"
      - ".github/workflows/datalab-overlap-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install pipeline
        run: python -m pip install -e .
      - name: Validate official Data Lab crossmatch join
        run: python scripts/probe_datalab_overlap_schema.py
