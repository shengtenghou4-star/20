name: LAMOST single-spectrum time header contract

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/lamost-spectrum-time-header-contract.yml'
      - 'scripts/probe_lamost_spectrum_time_header.py'
      - 'scripts/probe_lamost_spectrum_time_header_v2.py'
      - 'tests/test_probe_lamost_spectrum_time_header.py'
      - 'tests/test_probe_lamost_spectrum_time_header_v2.py'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lamost-spectrum-time-header-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install public pipeline
        run: python -m pip install -e '.[dev]'
      - name: Compile and run candidate-safe tests
        run: |
          python -m py_compile \
            scripts/probe_lamost_spectrum_time_header.py \
            scripts/probe_lamost_spectrum_time_header_v2.py \
            tests/test_probe_lamost_spectrum_time_header.py \
            tests/test_probe_lamost_spectrum_time_header_v2.py
          python tests/test_probe_lamost_spectrum_time_header.py -v
          python tests/test_probe_lamost_spectrum_time_header_v2.py -v
      - name: Probe official public spectrum info and gzip-aware FITS header
        id: probe
        continue-on-error: true
        run: |
          python scripts/probe_lamost_spectrum_time_header_v2.py \
            --output lamost_spectrum_time_header_contract.json \
            > lamost_spectrum_time_header_probe.log 2>&1
      - name: Upload candidate-safe contract
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lamost-spectrum-time-header-contract-${{ github.run_id }}
          path: |
            lamost_spectrum_time_header_contract.json
            lamost_spectrum_time_header_probe.log
          if-no-files-found: error
          retention-days: 30
      - name: Preserve live probe failure after artifact upload
        if: always()
        run: test '${{ steps.probe.outcome }}' = 'success'
