name: lamost-dr8-tap-smoke

on:
  pull_request:
    paths:
      - "src/hou_compact/lamost.py"
      - "scripts/probe_lamost_tap_schema.py"
      - ".github/workflows/lamost-tap-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  metadata-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install pipeline
        run: python -m pip install -e .
      - name: Discover LAMOST DR8 catalogue metadata
        run: python scripts/probe_lamost_tap_schema.py
