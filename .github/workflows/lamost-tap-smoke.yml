name: lamost-dr8-access-smoke

on:
  pull_request:
    paths:
      - "src/hou_compact/lamost.py"
      - "src/hou_compact/lamost_openapi.py"
      - "src/hou_compact/lamost_tap.py"
      - "scripts/probe_lamost_tap_schema.py"
      - "scripts/probe_lamost_openapi.py"
      - "scripts/probe_lamost_tap_contract.py"
      - "tests/test_lamost_openapi.py"
      - "tests/test_lamost_tap.py"
      - ".github/workflows/lamost-tap-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  metadata-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install pipeline
        run: python -m pip install -e .
      - name: Verify first-party LAMOST DR8 catalogue contract
        run: python scripts/probe_lamost_tap_schema.py
      - name: Discover official LAMOST OpenAPI metadata
        run: |
          mkdir -p outputs
          python scripts/probe_lamost_openapi.py \
            --diagnostic-output outputs/lamost_openapi_diagnostic.json \
            > outputs/lamost_openapi_contract.json
          test -s outputs/lamost_openapi_contract.json
      - name: Verify multiple-epoch columns through official TAP_SCHEMA
        run: |
          python scripts/probe_lamost_tap_contract.py \
            --output outputs/lamost_tap_contract.json \
            > outputs/lamost_tap_contract.stdout.json
          test -s outputs/lamost_tap_contract.json
      - name: Upload candidate-safe metadata receipts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lamost-access-contract-${{ github.run_id }}
          path: outputs/
          if-no-files-found: error
          retention-days: 30
