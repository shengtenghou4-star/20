name: LAMOST exact-obsid query contract

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/probe_lamost_search_form.py"
      - "tests/test_probe_lamost_search_form.py"
      - ".github/workflows/lamost-obsid-query-contract.yml"

permissions:
  contents: read

concurrency:
  group: lamost-obsid-query-contract-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile and test candidate-safe form parser
        run: |
          python -m py_compile \
            scripts/probe_lamost_search_form.py \
            tests/test_probe_lamost_search_form.py
          python -m unittest discover \
            -s tests \
            -p 'test_probe_lamost_search_form.py' \
            -v
      - name: Probe public LAMOST search-form contract
        id: probe
        continue-on-error: true
        run: |
          python scripts/probe_lamost_search_form.py \
            --output lamost_search_form_contract.json \
            > lamost_search_form_probe.log 2>&1
      - name: Upload candidate-safe form contract
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lamost-search-form-contract-${{ github.run_id }}
          path: |
            lamost_search_form_contract.json
            lamost_search_form_probe.log
          if-no-files-found: error
          retention-days: 30
      - name: Preserve probe failure after artifact upload
        if: always()
        run: test "${{ steps.probe.outcome }}" = "success"
