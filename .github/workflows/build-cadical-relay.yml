name: Build generic CaDiCaL relay

on:
  push:
    branches:
      - relay/kissat-4.0.4-build-20260725
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout relay branch
        uses: actions/checkout@v4

      - name: Build CaDiCaL
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/arminbiere/cadical.git cadical-src
          cd cadical-src
          git rev-parse HEAD | tee ../cadical-commit.txt
          ./configure
          make -j2
          ./build/cadical --version
          mkdir -p ../artifact-cadical
          cp build/cadical ../artifact-cadical/cadical
          cp build/libcadical.a ../artifact-cadical/libcadical.a
          cp src/cadical.hpp ../artifact-cadical/cadical.hpp
          cp src/ipasir.h ../artifact-cadical/ipasir.h
          cp ../cadical-commit.txt ../artifact-cadical/source-commit.txt
          sha256sum ../artifact-cadical/cadical ../artifact-cadical/libcadical.a ../artifact-cadical/cadical.hpp ../artifact-cadical/ipasir.h | tee ../artifact-cadical/SHA256SUMS
          ldd ../artifact-cadical/cadical | tee ../artifact-cadical/ldd.txt
          printf '%s\n' 'source=https://github.com/arminbiere/cadical' 'purpose=generic-solver-and-incremental-library-relay-only' > ../artifact-cadical/provenance.txt

      - name: Upload generic solver artifact
        uses: actions/upload-artifact@v4
        with:
          name: cadical-incremental-linux-x86_64
          path: artifact-cadical/
          if-no-files-found: error
          retention-days: 1
