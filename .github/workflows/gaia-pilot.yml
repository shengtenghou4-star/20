name: gaia-sb1-wp5-pilot

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/gaia-pilot.yml"
      - "queries/gaia_sb1_contamination_pilot_v5.adql"

concurrency:
  group: gaia-sb1-wp5-pilot
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  acquire-probe-and-triage:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Run deterministic unit tests before network acquisition
        run: pytest -q
      - name: Execute frozen Gaia SB1 v5 pilot query
        run: |
          python scripts/run_gaia_query.py \
            --query queries/gaia_sb1_contamination_pilot_v5.adql \
            --output outputs/gaia_sb1_contamination_pilot_v5.ecsv
      - name: Build preliminary GSP-Phot primary-mass priors
        run: |
          python scripts/prepare_primary_mass_priors.py \
            outputs/gaia_sb1_contamination_pilot_v5.ecsv \
            --output outputs/primary_mass_priors.csv \
            --max-rows 250 \
            --n-draws 5000
      - name: Build Gaia-correlation-aware mass products
        run: |
          python scripts/infer_mass_posteriors_correlated.py \
            outputs/gaia_sb1_contamination_pilot_v5.ecsv \
            --primary-masses outputs/primary_mass_priors.csv \
            --output outputs/mass_posteriors_correlated.csv \
            --max-rows 100 \
            --n-draws 10000
      - name: Build Gaia-side WP5 contamination audit
        run: |
          python scripts/audit_gaia_contamination.py \
            outputs/gaia_sb1_contamination_pilot_v5.ecsv \
            --output outputs/gaia_contamination_audit.csv \
            --max-rows 5000
      - name: Plan DESI single-epoch files
        run: |
          python scripts/plan_desi_files.py \
            outputs/gaia_sb1_contamination_pilot_v5.ecsv \
            --output outputs/desi_single_epoch_plan.csv
      - name: Probe DESI overlap without bulk download
        run: |
          python scripts/probe_desi_files.py \
            outputs/desi_single_epoch_plan.csv \
            --output outputs/desi_probe.csv \
            --workers 24 \
            --timeout 20 \
            --retries 2
      - name: Record workflow provenance
        run: |
          python - <<'PY'
          import json, os, pathlib
          path = pathlib.Path('outputs/github_actions_provenance.json')
          path.write_text(json.dumps({
              'repository': os.environ.get('GITHUB_REPOSITORY'),
              'run_id': os.environ.get('GITHUB_RUN_ID'),
              'run_attempt': os.environ.get('GITHUB_RUN_ATTEMPT'),
              'sha': os.environ.get('GITHUB_SHA'),
              'ref': os.environ.get('GITHUB_REF'),
          }, indent=2, sort_keys=True), encoding='utf-8')
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: gaia-sb1-wp5-pilot
          path: |
            outputs/gaia_sb1_contamination_pilot_v5.ecsv
            outputs/gaia_sb1_contamination_pilot_v5.ecsv.manifest.json
            outputs/primary_mass_priors.csv
            outputs/primary_mass_priors.csv.manifest.json
            outputs/mass_posteriors_correlated.csv
            outputs/mass_posteriors_correlated.csv.manifest.json
            outputs/gaia_contamination_audit.csv
            outputs/gaia_contamination_audit.csv.manifest.json
            outputs/desi_single_epoch_plan.csv
            outputs/desi_single_epoch_plan.csv.manifest.json
            outputs/desi_probe.csv
            outputs/desi_probe.csv.manifest.json
            outputs/github_actions_provenance.json
          if-no-files-found: error
          retention-days: 30
