name: gaia-sb1-wp5-pilot

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/gaia-pilot.yml"
      - "queries/gaia_sb1_contamination_pilot_v5.adql"

concurrency:
  group: gaia-sb1-wp5-pilot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  acquire-probe-and-triage:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        id: install
        run: python -m pip install -e '.[dev]'
      - name: Run deterministic unit tests before network acquisition
        id: tests
        run: pytest -q
      - name: Execute frozen Gaia SB1 v5 pilot query
        id: gaia
        run: |
          python scripts/run_gaia_query.py \
            --query queries/gaia_sb1_contamination_pilot_v5.adql \
            --output outputs/gaia_sb1_contamination_pilot_v5.ecsv
      - name: Build preliminary GSP-Phot primary-mass priors
        id: primary
        run: |
          python scripts/prepare_primary_mass_priors.py \
            outputs/gaia_sb1_contamination_pilot_v5.ecsv \
            --output outputs/primary_mass_priors.csv \
            --max-rows 250 \
            --n-draws 5000
      - name: Build Gaia-correlation-aware mass products
        id: masses
        run: |
          python scripts/infer_mass_posteriors_correlated.py \
            outputs/gaia_sb1_contamination_pilot_v5.ecsv \
            --primary-masses outputs/primary_mass_priors.csv \
            --output outputs/mass_posteriors_correlated.csv \
            --max-rows 100 \
            --n-draws 10000
      - name: Build Gaia-side WP5 contamination audit
        id: contamination
        run: |
          python scripts/audit_gaia_contamination.py \
            outputs/gaia_sb1_contamination_pilot_v5.ecsv \
            --output outputs/gaia_contamination_audit.csv \
            --max-rows 5000
      - name: Plan DESI single-epoch files
        id: plan
        run: |
          python scripts/plan_desi_files.py \
            outputs/gaia_sb1_contamination_pilot_v5.ecsv \
            --output outputs/desi_single_epoch_plan.csv
      - name: Probe DESI overlap without bulk download
        id: probe
        run: |
          python scripts/probe_desi_files.py \
            outputs/desi_single_epoch_plan.csv \
            --output outputs/desi_probe.csv \
            --workers 24 \
            --timeout 20 \
            --retries 2
      - name: Record workflow provenance
        if: always()
        run: |
          mkdir -p outputs
          python - <<'PY'
          import json, os, pathlib
          path = pathlib.Path('outputs/github_actions_provenance.json')
          path.write_text(json.dumps({
              'repository': os.environ.get('GITHUB_REPOSITORY'),
              'run_id': os.environ.get('GITHUB_RUN_ID'),
              'run_attempt': os.environ.get('GITHUB_RUN_ATTEMPT'),
              'sha': os.environ.get('GITHUB_SHA'),
              'ref': os.environ.get('GITHUB_REF'),
          }, indent=2, sort_keys=True), encoding='utf-8')
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gaia-sb1-wp5-pilot
          path: |
            outputs/gaia_sb1_contamination_pilot_v5.ecsv
            outputs/gaia_sb1_contamination_pilot_v5.ecsv.manifest.json
            outputs/primary_mass_priors.csv
            outputs/primary_mass_priors.csv.manifest.json
            outputs/mass_posteriors_correlated.csv
            outputs/mass_posteriors_correlated.csv.manifest.json
            outputs/gaia_contamination_audit.csv
            outputs/gaia_contamination_audit.csv.manifest.json
            outputs/desi_single_epoch_plan.csv
            outputs/desi_single_epoch_plan.csv.manifest.json
            outputs/desi_probe.csv
            outputs/desi_probe.csv.manifest.json
            outputs/github_actions_provenance.json
          if-no-files-found: warn
          retention-days: 30
      - name: Commit candidate-safe public run receipt
        if: always()
        continue-on-error: true
        env:
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
          GAIA_OUTCOME: ${{ steps.gaia.outcome }}
          PRIMARY_OUTCOME: ${{ steps.primary.outcome }}
          MASSES_OUTCOME: ${{ steps.masses.outcome }}
          CONTAMINATION_OUTCOME: ${{ steps.contamination.outcome }}
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          PROBE_OUTCOME: ${{ steps.probe.outcome }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          def load(path):
              candidate = Path(path)
              if not candidate.exists():
                  return None
              return json.loads(candidate.read_text(encoding='utf-8'))

          def select(payload, keys):
              if payload is None:
                  return None
              return {key: payload.get(key) for key in keys}

          gaia = load('outputs/gaia_sb1_contamination_pilot_v5.ecsv.manifest.json')
          primary = load('outputs/primary_mass_priors.csv.manifest.json')
          masses = load('outputs/mass_posteriors_correlated.csv.manifest.json')
          contamination = load('outputs/gaia_contamination_audit.csv.manifest.json')
          plan = load('outputs/desi_single_epoch_plan.csv.manifest.json')
          probe = load('outputs/desi_probe.csv.manifest.json')

          receipt = {
              'schema_version': '0.1',
              'candidate_safe': True,
              'repository': os.environ.get('GITHUB_REPOSITORY'),
              'run_id': int(os.environ['GITHUB_RUN_ID']),
              'run_attempt': int(os.environ['GITHUB_RUN_ATTEMPT']),
              'trigger_sha': os.environ.get('GITHUB_SHA'),
              'ref': os.environ.get('GITHUB_REF'),
              'step_outcomes': {
                  'install': os.environ.get('INSTALL_OUTCOME'),
                  'tests': os.environ.get('TESTS_OUTCOME'),
                  'gaia_query': os.environ.get('GAIA_OUTCOME'),
                  'primary_mass': os.environ.get('PRIMARY_OUTCOME'),
                  'correlated_masses': os.environ.get('MASSES_OUTCOME'),
                  'contamination_audit': os.environ.get('CONTAMINATION_OUTCOME'),
                  'desi_file_plan': os.environ.get('PLAN_OUTCOME'),
                  'desi_probe': os.environ.get('PROBE_OUTCOME'),
              },
              'gaia': select(gaia, [
                  'created_utc', 'tap_url', 'query_sha256', 'output_sha256',
                  'row_count', 'column_names'
              ]),
              'primary_mass': select(primary, [
                  'input_rows', 'rows_attempted', 'output_rows', 'status_counts',
                  'settings'
              ]),
              'correlated_masses': select(masses, [
                  'input_rows', 'rows_attempted', 'output_rows', 'status_counts',
                  'settings'
              ]),
              'contamination_audit': select(contamination, [
                  'input_rows', 'rows_attempted', 'output_rows', 'status_counts',
                  'thresholds'
              ]),
              'desi_file_plan': select(plan, [
                  'source_rows', 'unique_level6_healpix', 'planned_files',
                  'survey_programs'
              ]),
              'desi_probe': select(probe, [
                  'probed_rows', 'existing_files', 'unique_existing_healpix',
                  'status_counts', 'workers', 'timeout_seconds', 'retries'
              ]),
              'interpretation_boundary': (
                  'This receipt contains only candidate-safe counts, hashes, schema, '
                  'and step outcomes. It is not an astronomical result or candidate list.'
              ),
          }
          output = Path('results/public/runs') / f"{receipt['run_id']}.json"
          output.parent.mkdir(parents=True, exist_ok=True)
          output.write_text(json.dumps(receipt, indent=2, sort_keys=True), encoding='utf-8')
          print(output)
          PY
          git add results/public/runs/
          git commit -m "Record controlled Gaia WP5 run ${GITHUB_RUN_ID}" || exit 0
          git push origin HEAD:main
