name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Lint
        run: |
          set -o pipefail
          ruff check src tests scripts 2>&1 | tee ruff-output.txt
      - name: Test
        run: |
          set -o pipefail
          pytest -q --tb=short --junitxml=test-results.xml 2>&1 | tee pytest-output.txt
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-diagnostics
          path: |
            ruff-output.txt
            pytest-output.txt
            test-results.xml
          if-no-files-found: warn
          retention-days: 14
