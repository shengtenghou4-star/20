name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Lint
        run: ruff check src tests scripts
      - name: Test
        run: |
          set -o pipefail
          pytest -q --tb=short --junitxml=test-results.xml 2>&1 | tee pytest-output.txt
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-diagnostics
          path: |
            pytest-output.txt
            test-results.xml
          if-no-files-found: warn
          retention-days: 14
