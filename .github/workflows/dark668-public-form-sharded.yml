name: dark668-public-form-sharded

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dark668-public-form-sharded-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-and-freeze-public-inputs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Run deterministic contract tests
        run: |
          pytest -q \
            tests/test_dark668.py \
            tests/test_dark668_seed.py \
            tests/test_dark668_coverage.py \
            tests/test_dark668_rv.py \
            tests/test_dark668_kepler.py \
            tests/test_dark668_dynamics.py \
            tests/test_lamost_search_form.py \
            tests/test_lamost_form_response.py \
            tests/test_lamost_form_rv.py \
            tests/test_slice_dark668_seed.py
      - name: Acquire frozen public catalogues once
        run: |
          mkdir -p data/raw/dark668 outputs
          python scripts/acquire_dark668_catalogues.py \
            --output-dir data/raw/dark668 \
            --summary-output outputs/dark668_catalogue_summary.json
      - name: Upload frozen public inputs
        uses: actions/upload-artifact@v4
        with:
          name: dark668-frozen-public-inputs-${{ github.run_id }}
          path: data/raw/dark668/
          if-no-files-found: error
          retention-days: 1
      - name: Upload public-input receipt
        uses: actions/upload-artifact@v4
        with:
          name: dark668-public-input-receipt-${{ github.run_id }}
          path: outputs/dark668_catalogue_summary.json
          if-no-files-found: error
          retention-days: 30

  shard:
    needs: validate-and-freeze-public-inputs
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        shard_index: [0, 1, 2, 3, 4, 5, 6, 7]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        id: install
        continue-on-error: true
        run: python -m pip install -e .
      - name: Download frozen public inputs
        id: public_inputs
        if: steps.install.outcome == 'success'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: dark668-frozen-public-inputs-${{ github.run_id }}
          path: data/raw/dark668
      - name: Build and slice private seed
        id: prepare
        if: steps.public_inputs.outcome == 'success'
        continue-on-error: true
        env:
          SHARD_INDEX: ${{ matrix.shard_index }}
        run: |
          mkdir -p outputs/private
          python scripts/prepare_dark668_seed.py \
            --input-dir data/raw/dark668 \
            --population all \
            --output outputs/private/dark668_full_seed.csv \
            --safe-summary outputs/dark668_seed_summary.json
          python scripts/slice_dark668_seed.py \
            outputs/private/dark668_full_seed.csv \
            --shard-index "$SHARD_INDEX" \
            --shard-count 8 \
            --output outputs/private/dark668_shard_seed.csv \
            --safe-summary outputs/dark668_shard_seed_summary.json
          rm -f outputs/private/dark668_full_seed.csv

      - name: Query anonymous LAMOST RV epochs for shard
        id: form_rv
        if: steps.prepare.outcome == 'success'
        continue-on-error: true
        run: |
          python scripts/query_dark668_lamost_public_form.py \
            outputs/private/dark668_shard_seed.csv \
            --output outputs/private/dark668_lamost_form_epochs.csv \
            --safe-summary outputs/dark668_lamost_form_summary.json \
            --batch-size 20 \
            --separation-arcsec 2.0 \
            --request-delay-seconds 1.0 \
            --timeout 180

      - name: Summarize shard cadence and raw RV coverage
        id: coverage
        if: steps.form_rv.outcome == 'success'
        continue-on-error: true
        run: |
          python scripts/summarize_dark668_lamost_coverage.py \
            outputs/private/dark668_shard_seed.csv \
            outputs/private/dark668_lamost_form_epochs.csv \
            --output outputs/private/dark668_lamost_coverage.csv \
            --safe-summary outputs/dark668_lamost_coverage_summary.json

      - name: Run shard period-prior RV coherence triage
        id: period_score
        if: steps.form_rv.outcome == 'success'
        continue-on-error: true
        run: |
          python scripts/score_dark668_period_prior.py \
            outputs/private/dark668_shard_seed.csv \
            outputs/private/dark668_lamost_form_epochs.csv \
            --output outputs/private/dark668_period_prior_scores.csv \
            --safe-summary outputs/dark668_period_prior_summary.json \
            --minimum-visits 5 \
            --period-grid-size 192 \
            --permutations 99 \
            --base-seed 20260723

      - name: Run shard full Keplerian audit
        id: kepler_score
        if: steps.period_score.outcome == 'success'
        continue-on-error: true
        run: |
          python scripts/score_dark668_keplerian.py \
            outputs/private/dark668_shard_seed.csv \
            outputs/private/dark668_lamost_form_epochs.csv \
            --circular-scores outputs/private/dark668_period_prior_scores.csv \
            --output outputs/private/dark668_keplerian_scores.csv \
            --safe-summary outputs/dark668_keplerian_summary.json \
            --minimum-visits 7 \
            --minimum-circular-delta-bic 6 \
            --period-grid-size 192 \
            --maximum-eccentricity 0.95 \
            --random-starts 32 \
            --maximum-function-evaluations 4000 \
            --base-seed 20260723

      - name: Run shard dynamical mass and geometry audit
        id: dynamics
        if: steps.kepler_score.outcome == 'success'
        continue-on-error: true
        run: |
          python scripts/audit_dark668_dynamics.py \
            outputs/private/dark668_shard_seed.csv \
            outputs/private/dark668_keplerian_scores.csv \
            --output outputs/private/dark668_dynamical_audit.csv \
            --safe-summary outputs/dark668_dynamical_summary.json \
            --minimum-kepler-delta-bic 6 \
            --maximum-reduced-chi2 5 \
            --minimum-companion-mass-solar 3 \
            --maximum-roche-fill-proxy 0.8

      - name: Build candidate-safe shard receipt
        if: always()
        env:
          SHARD_INDEX: ${{ matrix.shard_index }}
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          PUBLIC_INPUT_OUTCOME: ${{ steps.public_inputs.outcome }}
          PREPARE_OUTCOME: ${{ steps.prepare.outcome }}
          FORM_RV_OUTCOME: ${{ steps.form_rv.outcome }}
          COVERAGE_OUTCOME: ${{ steps.coverage.outcome }}
          PERIOD_OUTCOME: ${{ steps.period_score.outcome }}
          KEPLER_OUTCOME: ${{ steps.kepler_score.outcome }}
          DYNAMICS_OUTCOME: ${{ steps.dynamics.outcome }}
        run: |
          mkdir -p outputs
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          names = [
              'dark668_seed_summary.json',
              'dark668_shard_seed_summary.json',
              'dark668_lamost_form_summary.json',
              'dark668_lamost_coverage_summary.json',
              'dark668_period_prior_summary.json',
              'dark668_keplerian_summary.json',
              'dark668_dynamical_summary.json',
          ]
          receipts = {}
          for name in names:
              path = Path('outputs') / name
              if path.exists():
                  receipts[name] = json.loads(path.read_text())
          payload = {
              'schema_version': '0.1',
              'candidate_safe': True,
              'shard_index': int(os.environ['SHARD_INDEX']),
              'shard_count': 8,
              'repository': os.environ.get('GITHUB_REPOSITORY'),
              'run_id': os.environ.get('GITHUB_RUN_ID'),
              'run_attempt': os.environ.get('GITHUB_RUN_ATTEMPT'),
              'assignment': '(priority_rank - 1) modulo 8',
              'identity_route': (
                  'Coordinates discover nearby anonymous-form rows; retained rows require '
                  'exact Gaia DR3 character equality within this shard.'
              ),
              'steps': {
                  'install': os.environ.get('INSTALL_OUTCOME'),
                  'public_inputs': os.environ.get('PUBLIC_INPUT_OUTCOME'),
                  'prepare': os.environ.get('PREPARE_OUTCOME'),
                  'anonymous_form_rv': os.environ.get('FORM_RV_OUTCOME'),
                  'coverage': os.environ.get('COVERAGE_OUTCOME'),
                  'period_score': os.environ.get('PERIOD_OUTCOME'),
                  'kepler_score': os.environ.get('KEPLER_OUTCOME'),
                  'dynamics': os.environ.get('DYNAMICS_OUTCOME'),
              },
              'receipts': receipts,
              'claim_boundary': (
                  'Shard follow-up data and model audits only; no binary, compact-object, '
                  'neutron-star, black-hole, or novelty classification is authorized.'
              ),
          }
          Path('outputs/dark668_shard_stack_summary.json').write_text(
              json.dumps(payload, indent=2, sort_keys=True)
          )
          print(json.dumps(payload, indent=2, sort_keys=True))
          PY

      - name: Encrypt shard source-level evidence
        if: always()
        env:
          SHARD_INDEX: ${{ matrix.shard_index }}
        run: |
          set -euo pipefail
          mkdir -p encrypted_output
          if [[ -d outputs/private ]]; then
            tar -C outputs/private -czf /tmp/dark668_shard_private.tar.gz .
          else
            mkdir -p /tmp/dark668_empty
            printf '%s\n' 'No source-level output directory was produced.' \
              > /tmp/dark668_empty/NO_SOURCE_OUTPUT.txt
            tar -C /tmp/dark668_empty -czf /tmp/dark668_shard_private.tar.gz .
          fi
          openssl rand -hex 32 > /tmp/dark668_shard_passphrase.txt
          openssl enc -aes-256-cbc -salt -pbkdf2 -iter 200000 \
            -pass file:/tmp/dark668_shard_passphrase.txt \
            -in /tmp/dark668_shard_private.tar.gz \
            -out "encrypted_output/dark668_shard_${SHARD_INDEX}_private.tar.gz.enc"
          openssl pkeyutl -encrypt \
            -pubin \
            -inkey keys/hou_compact_relay_public.pem \
            -in /tmp/dark668_shard_passphrase.txt \
            -out "encrypted_output/dark668_shard_${SHARD_INDEX}_private.key.enc" \
            -pkeyopt rsa_padding_mode:oaep \
            -pkeyopt rsa_oaep_md:sha256
          cp outputs/dark668_shard_stack_summary.json encrypted_output/
          sha256sum encrypted_output/* > encrypted_output/SHA256SUMS
          shred -u \
            /tmp/dark668_shard_passphrase.txt \
            /tmp/dark668_shard_private.tar.gz
          rm -rf /tmp/dark668_empty outputs/private data/raw/dark668

      - name: Upload encrypted shard evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dark668-shard-encrypted-${{ matrix.shard_index }}-${{ github.run_id }}
          path: encrypted_output/
          if-no-files-found: error
          retention-days: 90

      - name: Upload candidate-safe shard receipts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dark668-shard-safe-${{ matrix.shard_index }}-${{ github.run_id }}
          path: outputs/*.json
          if-no-files-found: warn
          retention-days: 30

      - name: Preserve shard failures after encryption
        if: always()
        run: |
          test "${{ steps.install.outcome }}" = "success"
          test "${{ steps.public_inputs.outcome }}" = "success"
          test "${{ steps.prepare.outcome }}" = "success"
          test "${{ steps.form_rv.outcome }}" = "success"
          test "${{ steps.coverage.outcome }}" = "success"
          test "${{ steps.period_score.outcome }}" = "success"
          test "${{ steps.kepler_score.outcome }}" = "success"
          test "${{ steps.dynamics.outcome }}" = "success"

  aggregate-safe-receipts:
    if: always()
    needs: [validate-and-freeze-public-inputs, shard]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dark668-shard-safe-*-${{ github.run_id }}
          path: safe_shards
      - name: Aggregate candidate-safe shard totals
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          summaries = []
          for path in sorted(Path('safe_shards').rglob('dark668_shard_stack_summary.json')):
              summaries.append(json.loads(path.read_text()))
          shard_indices = sorted(item['shard_index'] for item in summaries)
          totals = {
              'target_count': 0,
              'matched_source_count': 0,
              'exact_identity_epoch_rows': 0,
              'quality_pass_epoch_rows': 0,
          }
          step_statuses = {}
          for item in summaries:
              index = str(item['shard_index'])
              step_statuses[index] = item.get('steps', {})
              form = item.get('receipts', {}).get('dark668_lamost_form_summary.json', {})
              form_summary = form.get('summary', {})
              for key in totals:
                  totals[key] += int(form_summary.get(key, 0))
          payload = {
              'schema_version': '0.1',
              'candidate_safe': True,
              'expected_shards': list(range(8)),
              'received_shards': shard_indices,
              'complete_shard_set': shard_indices == list(range(8)),
              'totals': totals,
              'step_statuses': step_statuses,
              'claim_boundary': (
                  'Aggregate public follow-up coverage and model-pipeline status only; '
                  'no source identities, coordinates, RVs, orbital parameters, masses, '
                  'or classifications are included.'
              ),
          }
          Path('dark668_sharded_safe_aggregate.json').write_text(
              json.dumps(payload, indent=2, sort_keys=True)
          )
          print(json.dumps(payload, indent=2, sort_keys=True))
          PY
      - name: Upload aggregate safe receipt
        uses: actions/upload-artifact@v4
        with:
          name: dark668-sharded-safe-aggregate-${{ github.run_id }}
          path: dark668_sharded_safe_aggregate.json
          if-no-files-found: error
          retention-days: 30
