name: lamost-openapi-smoke

on:
  pull_request:
    paths:
      - "src/hou_compact/lamost_openapi.py"
      - "scripts/probe_lamost_openapi.py"
      - "tests/test_lamost_openapi.py"
      - ".github/workflows/lamost-openapi-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  metadata-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install pipeline
        run: python -m pip install -e .
      - name: Discover official LAMOST OpenAPI and TAP metadata
        run: |
          mkdir -p outputs
          python scripts/probe_lamost_openapi.py \
            --diagnostic-output outputs/lamost_openapi_diagnostic.json \
            > outputs/lamost_openapi_contract.json
          test -s outputs/lamost_openapi_contract.json
      - name: Upload candidate-safe metadata receipts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lamost-openapi-contract-${{ github.run_id }}
          path: outputs/
          if-no-files-found: error
          retention-days: 30
