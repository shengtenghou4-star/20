name: dark668-lamost-gaia-id-form-contract

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dark668-lamost-gaia-id-form-contract-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-native-gaia-id-form:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Validate exact-ID payload and response parsing
        run: pytest -q tests/test_lamost_gaia_id_form.py
      - name: Probe native Gaia DR3 ID RV contract
        run: |
          mkdir -p outputs
          python scripts/probe_lamost_gaia_id_form.py \
            --sample-size 25 \
            --output outputs/lamost_gaia_id_form_contract.json
      - name: Upload candidate-safe contract receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dark668-lamost-gaia-id-form-contract-${{ github.run_id }}
          path: outputs/lamost_gaia_id_form_contract.json
          if-no-files-found: warn
          retention-days: 30
