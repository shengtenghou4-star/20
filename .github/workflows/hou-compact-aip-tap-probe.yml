name: HOU-COMPACT Gaia AIP de-identified TAP probe

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/hou-compact-aip-tap-probe.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hou-compact-aip-tap-probe-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  anonymous-aip-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout audited branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install TAP client
        run: python -m pip install 'pyvo>=1.5' 'astropy>=6.1'

      - name: Probe synchronous and asynchronous Gaia AIP contracts
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          import pyvo

          service = pyvo.dal.TAPService('https://gaia.aip.de/tap')
          query = '''
          SELECT TOP 1
              source_id,
              nss_solution_type,
              bit_index,
              corr_vec
          FROM gaiadr3.nss_two_body_orbit
          WHERE nss_solution_type IN ('SB1', 'SB1C')
            AND bit_index IS NOT NULL
            AND corr_vec IS NOT NULL
          '''
          required = {'source_id', 'nss_solution_type', 'bit_index', 'corr_vec'}

          sync_result = service.run_sync(query, maxrec=1).to_table()
          assert len(sync_result) == 1
          assert required <= {str(name).lower() for name in sync_result.colnames}

          job = service.submit_job(query, maxrec=1, queue='30s')
          try:
              job.run()
              job.wait(phases=['COMPLETED', 'ERROR', 'ABORTED'], timeout=180)
              job.raise_if_error()
              async_result = job.fetch_result().to_table()
          finally:
              try:
                  job.delete()
              except Exception:
                  pass

          assert len(async_result) == 1
          assert required <= {str(name).lower() for name in async_result.colnames}

          receipt = {
              'schema_version': '1.1',
              'candidate_safe': True,
              'status': 'success',
              'tap_service': 'Gaia@AIP',
              'anonymous_access': True,
              'sync_success': True,
              'async_success': True,
              'async_queue': '30s',
              'sync_row_count': len(sync_result),
              'async_row_count': len(async_result),
              'required_columns_present': True,
              'claim_boundary': (
                  'Service, schema, and anonymous async-queue contract only; no source '
                  'identifier, row value, coordinate, orbit parameter, covariance value, '
                  'remote job identifier, or candidate identity is printed or persisted.'
              ),
          }
          Path('aip_probe_safe_receipt.json').write_text(
              json.dumps(receipt, indent=2, sort_keys=True), encoding='utf-8')
          print(json.dumps(receipt, sort_keys=True))
          PY

      - name: Upload candidate-safe probe receipt
        uses: actions/upload-artifact@v4
        with:
          name: hou-compact-aip-safe-probe-${{ github.run_id }}
          path: aip_probe_safe_receipt.json
          if-no-files-found: error
          retention-days: 14
