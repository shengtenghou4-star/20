name: dark668-desi-dr1-contract

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dark668-desi-dr1-contract-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-desi-dr1-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Validate DESI exact-ID and locator logic
        run: pytest -q tests/test_desi_dr1.py
      - name: Probe live DESI DR1 MWS coadd and locator contract
        run: |
          mkdir -p outputs
          python scripts/probe_desi_dr1_mws_tap.py \
            --output outputs/desi_dr1_mws_tap_contract.json
      - name: Upload candidate-safe contract receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dark668-desi-dr1-contract-${{ github.run_id }}
          path: outputs/desi_dr1_mws_tap_contract.json
          if-no-files-found: warn
          retention-days: 30
