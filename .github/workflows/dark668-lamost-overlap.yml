name: dark668-lamost-overlap

on:
  pull_request:
    paths:
      - "src/hou_compact/dark668.py"
      - "src/hou_compact/lamost.py"
      - "scripts/acquire_dark668_catalogues.py"
      - "scripts/prepare_dark668_seed.py"
      - "scripts/query_gaia_dr2_bridge.py"
      - "scripts/extract_lamost_dr8_overlap.py"
      - "keys/hou_compact_relay_public.pem"
      - ".github/workflows/dark668-lamost-overlap.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dark668-lamost-overlap-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  exact-multiple-epoch-overlap:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Prepare ephemeral all-668 seed and release bridge
        run: |
          python scripts/acquire_dark668_catalogues.py \
            --output-dir data/raw/dark668 \
            --summary-output outputs/dark668_catalogue_summary.json
          python scripts/prepare_dark668_seed.py \
            --input-dir data/raw/dark668 \
            --population all \
            --output outputs/private/dark668_seed.csv \
            --safe-summary outputs/dark668_seed_summary.json
          python scripts/query_gaia_dr2_bridge.py \
            outputs/private/dark668_seed.csv \
            --output outputs/private/dark668_gaia_dr2_bridge.csv \
            --neighbourhood-output outputs/private/dark668_gaia_dr2_neighbourhood.csv \
            --batch-size 200 \
            --maxrec-per-batch 4000 \
            --overwrite \
            > outputs/private/dark668_gaia_bridge.stdout.json
      - name: Download official LAMOST DR8 LRS multiple-epoch catalogue
        run: |
          mkdir -p data/raw/lamost
          curl --fail --location \
            --retry 5 --retry-delay 5 --retry-all-errors \
            --connect-timeout 60 --max-time 2400 \
            --output data/raw/lamost/dr8_v1.0_LRS_mec.csv.gz \
            'https://www.lamost.org/dr8/v1.0/catdl?name=dr8_v1.0_LRS_mec.csv.gz'
          python - <<'PY'
          import gzip
          import hashlib
          from pathlib import Path

          path = Path('data/raw/lamost/dr8_v1.0_LRS_mec.csv.gz')
          assert path.stat().st_size > 1024
          with path.open('rb') as handle:
              assert handle.read(2) == b'\x1f\x8b'
          with gzip.open(path, 'rt', encoding='utf-8-sig') as handle:
              header = handle.readline()
          required = {'gaia_source_id', 'obs_number', 'obsid_list', 'midmjm_list', 'rv_list'}
          assert required.issubset(set(header.strip().split(',')))
          digest = hashlib.sha256(path.read_bytes()).hexdigest()
          Path('outputs/lamost_mec_file_receipt.json').write_text(
              '{\n'
              f'  "bytes": {path.stat().st_size},\n'
              f'  "sha256": "{digest}",\n'
              '  "candidate_safe": true\n'
              '}\n'
          )
          PY
      - name: Scan exact Gaia-bridged overlap
        run: |
          python scripts/extract_lamost_dr8_overlap.py \
            data/raw/lamost/dr8_v1.0_LRS_mec.csv.gz \
            outputs/private/dark668_gaia_dr2_bridge.csv \
            --output outputs/private/dark668_lamost_epochs.csv \
            --chunk-size 100000 \
            > outputs/private/dark668_lamost_overlap.stdout.json
      - name: Emit candidate-safe overlap receipt
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          import pandas as pd

          manifest_path = Path(
              'outputs/private/dark668_lamost_epochs.csv.manifest.json'
          )
          manifest = json.loads(manifest_path.read_text())
          safe = {
              'schema_version': '0.1',
              'candidate_safe': True,
              'bridge_accepted_source_count': manifest['bridge']['accepted_source_count'],
              'bridge_status_counts': manifest['bridge']['status_counts'],
              'multiple_epoch_scan': manifest['multiple_epoch_scan'],
              'output_rows': manifest['output_rows'],
              'output_gaia_dr3_sources': manifest['output_gaia_dr3_sources'],
              'epoch_status_counts': manifest['epoch_status_counts'],
              'claim_boundary': (
                  'Exact release-aware LAMOST coverage only. No identifiers, rankings, '
                  'velocities, orbital fits, or classifications are included.'
              ),
          }
          if manifest['output_rows']:
              epochs = pd.read_csv('outputs/private/dark668_lamost_epochs.csv')
              visits = epochs.groupby('source_id', sort=False).size()
              safe['visit_count_summary'] = {
                  'sources_ge_2_visits': int(visits.ge(2).sum()),
                  'sources_ge_3_visits': int(visits.ge(3).sum()),
                  'sources_ge_5_visits': int(visits.ge(5).sum()),
                  'minimum': int(visits.min()),
                  'median': float(visits.median()),
                  'maximum': int(visits.max()),
              }
          output = Path('outputs/dark668_lamost_overlap_summary.json')
          output.write_text(json.dumps(safe, indent=2, sort_keys=True))
          print(json.dumps(safe, indent=2, sort_keys=True))
          PY
      - name: Encrypt source-level LAMOST overlap evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p encrypted_output
          if [[ -d outputs/private ]]; then
            tar -C outputs/private -czf /tmp/dark668_lamost_private.tar.gz .
          else
            mkdir -p /tmp/dark668_empty
            printf '%s\n' 'No source-level output directory was produced.' \
              > /tmp/dark668_empty/NO_SOURCE_OUTPUT.txt
            tar -C /tmp/dark668_empty -czf /tmp/dark668_lamost_private.tar.gz .
          fi
          openssl rand -hex 32 > /tmp/dark668_lamost_passphrase.txt
          openssl enc -aes-256-cbc -salt -pbkdf2 -iter 200000 \
            -pass file:/tmp/dark668_lamost_passphrase.txt \
            -in /tmp/dark668_lamost_private.tar.gz \
            -out encrypted_output/dark668_lamost_private.tar.gz.enc
          openssl pkeyutl -encrypt \
            -pubin \
            -inkey keys/hou_compact_relay_public.pem \
            -in /tmp/dark668_lamost_passphrase.txt \
            -out encrypted_output/dark668_lamost_private.key.enc \
            -pkeyopt rsa_padding_mode:oaep \
            -pkeyopt rsa_oaep_md:sha256
          for receipt in \
            outputs/dark668_catalogue_summary.json \
            outputs/dark668_seed_summary.json \
            outputs/lamost_mec_file_receipt.json \
            outputs/dark668_lamost_overlap_summary.json; do
            if [[ -f "$receipt" ]]; then
              cp "$receipt" encrypted_output/
            fi
          done
          sha256sum encrypted_output/* > encrypted_output/SHA256SUMS
          shred -u \
            /tmp/dark668_lamost_passphrase.txt \
            /tmp/dark668_lamost_private.tar.gz
          rm -rf /tmp/dark668_empty outputs/private data/raw/dark668 data/raw/lamost
      - name: Upload encrypted source-level package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dark668-lamost-overlap-encrypted-${{ github.run_id }}
          path: encrypted_output/
          if-no-files-found: error
          retention-days: 90
      - name: Upload candidate-safe receipts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dark668-lamost-overlap-${{ github.run_id }}
          path: |
            outputs/dark668_catalogue_summary.json
            outputs/dark668_seed_summary.json
            outputs/lamost_mec_file_receipt.json
            outputs/dark668_lamost_overlap_summary.json
          if-no-files-found: warn
          retention-days: 30
