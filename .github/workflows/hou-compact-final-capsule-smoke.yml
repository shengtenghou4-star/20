name: HOU-COMPACT final capsule smoke

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/hou-compact-final-capsule-smoke.yml'
      - 'capsules/hou_compact_final/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hou-compact-final-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: python -m pip install -e '.[dev,reference]'
      - name: Compile final capsule
        run: |
          python -m py_compile \
            capsules/hou_compact_final/hou_compact/*.py \
            capsules/hou_compact_final/tests/test_final_capsule.py
      - name: Run candidate-safe synthetic diagnostics
        env:
          PYTHONPATH: capsules/hou_compact_final/hou_compact:src
        run: |
          set -o pipefail
          python -m unittest discover \
            -s capsules/hou_compact_final/tests \
            -p 'test_final_capsule.py' -v \
            2>&1 | tee final_capsule_smoke.log
      - name: Probe anonymous Gaia AIP TAP contract
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          import pyvo

          service = pyvo.dal.TAPService('https://gaia.aip.de/tap')
          query = '''
          SELECT TOP 1
              source_id,
              nss_solution_type,
              bit_index,
              corr_vec
          FROM gaiadr3.nss_two_body_orbit
          WHERE nss_solution_type IN ('SB1', 'SB1C')
            AND bit_index IS NOT NULL
            AND corr_vec IS NOT NULL
          '''
          result = service.run_sync(query, maxrec=1).to_table()
          assert len(result) == 1
          names = {str(name).lower() for name in result.colnames}
          assert {'source_id', 'nss_solution_type', 'bit_index', 'corr_vec'} <= names
          receipt = {
              'schema_version': '1.0',
              'candidate_safe': True,
              'status': 'success',
              'tap_service': 'Gaia@AIP',
              'anonymous_access': True,
              'row_count': len(result),
              'required_columns_present': True,
              'claim_boundary': (
                  'Service and schema contract only; no source identifier, row value, '
                  'coordinate, orbit parameter, covariance value, or candidate identity '
                  'is printed or persisted.'
              ),
          }
          Path('aip_probe_safe_receipt.json').write_text(
              json.dumps(receipt, indent=2, sort_keys=True), encoding='utf-8')
          print(json.dumps(receipt, sort_keys=True))
          PY
      - name: Upload candidate-safe smoke receipts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hou-compact-final-capsule-smoke-${{ github.run_id }}
          path: |
            final_capsule_smoke.log
            aip_probe_safe_receipt.json
          if-no-files-found: warn
          retention-days: 14
