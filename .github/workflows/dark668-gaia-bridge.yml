name: dark668-gaia-bridge

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dark668-gaia-bridge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  exact-release-bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Seed tests
        run: pytest -q tests/test_dark668.py tests/test_dark668_seed.py
      - name: Acquire frozen public catalogues
        run: |
          python scripts/acquire_dark668_catalogues.py \
            --output-dir data/raw/dark668 \
            --summary-output outputs/dark668_catalogue_summary.json
      - name: Build ephemeral 668-source seed
        run: |
          python scripts/prepare_dark668_seed.py \
            --input-dir data/raw/dark668 \
            --population all \
            --output outputs/private/dark668_seed.csv \
            --safe-summary outputs/dark668_seed_summary.json
          test "$(python - <<'PY'
          import pandas as pd
          print(len(pd.read_csv('outputs/private/dark668_seed.csv', dtype={'source_id': str})))
          PY
          )" = "668"
      - name: Resolve exact Gaia DR3 to DR2 identities
        run: |
          python scripts/query_gaia_dr2_bridge.py \
            outputs/private/dark668_seed.csv \
            --output outputs/private/dark668_gaia_dr2_bridge.csv \
            --neighbourhood-output outputs/private/dark668_gaia_dr2_neighbourhood.csv \
            --batch-size 200 \
            --maxrec-per-batch 4000 \
            --overwrite \
            > outputs/private/dark668_gaia_bridge.stdout.json
      - name: Emit candidate-safe bridge receipt
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          private_manifest = json.loads(
              Path('outputs/private/dark668_gaia_dr2_bridge.csv.manifest.json').read_text()
          )
          safe = {
              'schema_version': '0.1',
              'candidate_safe': True,
              'input_source_count': private_manifest['input_source_count'],
              'audited_rows': private_manifest['audited_rows'],
              'accepted_source_count': private_manifest['accepted_source_count'],
              'status_counts': private_manifest['status_counts'],
              'neighbourhood_rows': private_manifest['neighbourhood_rows'],
              'neighbourhood_source_count': private_manifest['neighbourhood_source_count'],
              'batch_count': len(private_manifest['batch_receipts']),
              'settings': private_manifest['settings'],
              'claim_boundary': (
                  'Release-identifier association only. No source-level identifiers, '
                  'coordinates, rankings, or astrophysical classifications are included.'
              ),
          }
          output = Path('outputs/dark668_gaia_bridge_summary.json')
          output.write_text(json.dumps(safe, indent=2, sort_keys=True))
          print(json.dumps(safe, indent=2, sort_keys=True))
          assert safe['input_source_count'] == 668
          assert safe['audited_rows'] == 668
          PY
      - name: Delete source-level products before upload
        if: always()
        run: rm -rf outputs/private data/raw/dark668
      - name: Upload candidate-safe receipts only
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dark668-gaia-bridge-${{ github.run_id }}
          path: |
            outputs/dark668_catalogue_summary.json
            outputs/dark668_seed_summary.json
            outputs/dark668_gaia_bridge_summary.json
          if-no-files-found: warn
          retention-days: 30
