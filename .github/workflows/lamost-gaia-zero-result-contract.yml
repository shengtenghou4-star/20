name: LAMOST Gaia zero-result contract

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/probe_lamost_gaia_zero_result.py"
      - "tests/test_probe_lamost_gaia_zero_result.py"
      - ".github/workflows/lamost-gaia-zero-result-contract.yml"

permissions:
  contents: read

concurrency:
  group: lamost-gaia-zero-result-contract-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install public pipeline
        run: python -m pip install -e '.[dev]'
      - name: Compile and run privacy-boundary tests
        run: |
          python -m py_compile \
            scripts/probe_lamost_gaia_zero_result.py \
            tests/test_probe_lamost_gaia_zero_result.py
          python -m unittest discover \
            -s tests \
            -p 'test_probe_lamost_gaia_zero_result.py' \
            -v
      - name: Probe non-existent Gaia DR2 response contract
        id: probe
        continue-on-error: true
        run: |
          python scripts/probe_lamost_gaia_zero_result.py \
            --output lamost_gaia_zero_result_contract.json \
            > lamost_gaia_zero_result_probe.log 2>&1
      - name: Upload candidate-safe zero-result contract
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lamost-gaia-zero-result-contract-${{ github.run_id }}
          path: |
            lamost_gaia_zero_result_contract.json
            lamost_gaia_zero_result_probe.log
          if-no-files-found: error
          retention-days: 30
      - name: Preserve probe failure after artifact upload
        if: always()
        run: test "${{ steps.probe.outcome }}" = "success"
