name: dark668-lamost-dr3-contract

on:
  pull_request:
    paths:
      - "scripts/probe_lamost_tap_rv_schema.py"
      - "src/hou_compact/lamost_dr3_spectra.py"
      - "src/hou_compact/lamost_openapi.py"
      - "src/hou_compact/lamost_openapi_sql.py"
      - "tests/test_lamost_dr3_spectra.py"
      - "tests/test_lamost_openapi_sql.py"
      - ".github/workflows/dark668-lamost-tap-schema.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dark668-lamost-dr3-contract-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-direct-dr3-rv-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e .
      - name: Validate direct DR3 per-spectrum contract
        run: |
          python scripts/probe_lamost_tap_rv_schema.py \
            --dr-version dr8 \
            --sub-version v2.0 \
            --output outputs/lamost_dr3_spectrum_contract.json
      - name: Upload candidate-safe contract receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dark668-lamost-dr3-contract-${{ github.run_id }}
          path: outputs/lamost_dr3_spectrum_contract.json
          if-no-files-found: warn
          retention-days: 30
