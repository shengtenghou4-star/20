name: dark668-lamost-public-query-metadata

on:
  pull_request:
    paths:
      - "scripts/probe_lamost_public_query_metadata.py"
      - "tests/test_lamost_public_query_metadata.py"
      - ".github/workflows/dark668-lamost-tap-schema.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dark668-lamost-public-query-metadata-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  probe-public-query-metadata:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e .
      - name: Validate metadata extraction tests
        id: metadata_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p outputs
          pytest -vv tests/test_lamost_public_query_metadata.py 2>&1 \
            | tee outputs/lamost_public_query_metadata_tests.log
      - name: Extract official OpenAPI and search-form contract
        id: metadata_probe
        continue-on-error: true
        run: |
          python scripts/probe_lamost_public_query_metadata.py \
            --output outputs/lamost_public_query_metadata.json
      - name: Upload candidate-safe metadata and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dark668-lamost-public-query-metadata-${{ github.run_id }}
          path: outputs/*
          if-no-files-found: warn
          retention-days: 30
      - name: Preserve metadata failures after diagnostics
        if: always()
        run: |
          test "${{ steps.metadata_tests.outcome }}" = "success"
          test "${{ steps.metadata_probe.outcome }}" = "success"
