name: dark668-lamost-search-form-contract

on:
  pull_request:
    paths:
      - "scripts/probe_lamost_search_form_contract.py"
      - "tests/test_lamost_search_form_contract.py"
      - ".github/workflows/dark668-lamost-tap-schema.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dark668-lamost-search-form-contract-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  probe-search-form-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Validate form-contract extraction
        run: pytest -q tests/test_lamost_search_form_contract.py
      - name: Extract form defaults and JavaScript submission snippets
        run: |
          mkdir -p outputs
          python scripts/probe_lamost_search_form_contract.py \
            --output outputs/lamost_search_form_contract.json
      - name: Upload candidate-safe form contract
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dark668-lamost-search-form-contract-${{ github.run_id }}
          path: outputs/*
          if-no-files-found: warn
          retention-days: 30
