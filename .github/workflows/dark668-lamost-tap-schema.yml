name: dark668-lamost-anonymous-table-query

on:
  pull_request:
    paths:
      - "src/hou_compact/lamost_table_query.py"
      - "scripts/probe_lamost_anonymous_table_query.py"
      - "tests/test_lamost_table_query.py"
      - ".github/workflows/dark668-lamost-tap-schema.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dark668-lamost-anonymous-table-query-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-anonymous-table-query:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Validate bounded TableQuery transport
        run: pytest -q tests/test_lamost_table_query.py
      - name: Probe anonymous combined RV query
        id: table_probe
        continue-on-error: true
        run: |
          mkdir -p outputs
          python scripts/probe_lamost_anonymous_table_query.py \
            --output outputs/lamost_anonymous_table_query_contract.json
      - name: Upload candidate-safe TableQuery receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dark668-lamost-anonymous-table-query-${{ github.run_id }}
          path: outputs/*
          if-no-files-found: warn
          retention-days: 30
      - name: Preserve live query failure after receipt
        if: always()
        run: test "${{ steps.table_probe.outcome }}" = "success"
