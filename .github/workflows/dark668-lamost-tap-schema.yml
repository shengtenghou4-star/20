name: dark668-lamost-public-rv-contract

on:
  pull_request:
    paths:
      - "scripts/probe_lamost_public_fits_contract.py"
      - "src/hou_compact/lamost_conesearch.py"
      - "src/hou_compact/lamost_spectrum_fits.py"
      - "tests/test_lamost_conesearch.py"
      - "tests/test_lamost_spectrum_fits.py"
      - ".github/workflows/dark668-lamost-tap-schema.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dark668-lamost-public-rv-contract-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-public-rv-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e .
      - name: Validate public ConeSearch to FITS RV contract
        run: |
          python scripts/probe_lamost_public_fits_contract.py \
            --output outputs/lamost_public_fits_contract.json
      - name: Upload candidate-safe contract receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dark668-lamost-public-rv-contract-${{ github.run_id }}
          path: outputs/lamost_public_fits_contract.json
          if-no-files-found: warn
          retention-days: 30
