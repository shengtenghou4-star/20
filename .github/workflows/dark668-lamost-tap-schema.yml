name: dark668-lamost-anonymous-form-rv

on:
  pull_request:
    paths:
      - "src/hou_compact/lamost_search_form.py"
      - "scripts/probe_lamost_anonymous_search_submit.py"
      - "tests/test_lamost_search_form.py"
      - "tests/test_lamost_anonymous_search_submit.py"
      - ".github/workflows/dark668-lamost-tap-schema.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dark668-lamost-anonymous-form-rv-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-anonymous-form-rv:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Validate multipart and result parsing
        run: |
          pytest -q \
            tests/test_lamost_search_form.py \
            tests/test_lamost_anonymous_search_submit.py
      - name: Probe anonymous browser-form RV output
        run: |
          mkdir -p outputs
          python scripts/probe_lamost_anonymous_search_submit.py \
            --output outputs/lamost_anonymous_form_rv_contract.json
      - name: Upload candidate-safe browser-form receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dark668-lamost-anonymous-form-rv-${{ github.run_id }}
          path: outputs/*
          if-no-files-found: warn
          retention-days: 30
