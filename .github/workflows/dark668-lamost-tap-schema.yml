name: dark668-lamost-anonymous-form-rv

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dark668-lamost-anonymous-form-rv-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-anonymous-form-rv:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Validate multipart and delimited result parsing
        run: |
          pytest -q \
            tests/test_lamost_search_form.py \
            tests/test_lamost_form_response.py
      - name: Probe exact-identity finite RV/error pairs
        run: |
          mkdir -p outputs
          python scripts/probe_lamost_anonymous_form_rv_v2.py \
            --sample-size 25 \
            --output outputs/lamost_anonymous_form_rv_v2_contract.json
      - name: Upload candidate-safe browser-form receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dark668-lamost-anonymous-form-rv-${{ github.run_id }}
          path: outputs/*
          if-no-files-found: warn
          retention-days: 30
