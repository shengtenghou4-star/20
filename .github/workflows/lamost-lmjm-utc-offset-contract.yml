name: LAMOST LMJM to UTC offset contract

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/lamost-lmjm-utc-offset-contract.yml'
      - 'scripts/probe_lamost_lmjm_utc_offset.py'
      - 'scripts/probe_lamost_lmjm_utc_offset_stream.py'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lamost-lmjm-utc-offset-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install public pipeline
        run: python -m pip install -e '.[dev]'
      - name: Compile candidate-safe probes
        run: |
          python -m py_compile \
            scripts/probe_lamost_lmjm_utc_offset.py \
            scripts/probe_lamost_lmjm_utc_offset_stream.py
      - name: Stream bounded public MEC prefix and compare exact FITS DATE-OBS
        id: probe
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python scripts/probe_lamost_lmjm_utc_offset_stream.py \
            --sample-size 9 \
            --timeout 180 \
            --output lamost_lmjm_utc_offset_contract.json \
            > lamost_lmjm_utc_offset_probe.log 2>&1
      - name: Upload candidate-safe offset contract
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lamost-lmjm-utc-offset-contract-${{ github.run_id }}
          path: |
            lamost_lmjm_utc_offset_contract.json
            lamost_lmjm_utc_offset_probe.log
          if-no-files-found: error
          retention-days: 30
      - name: Preserve contract failure after upload
        if: always()
        run: test '${{ steps.probe.outcome }}' = 'success'
